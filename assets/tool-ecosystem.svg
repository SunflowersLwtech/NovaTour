<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520">
  <defs>
    <linearGradient id="teBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="teGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="teAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <filter id="teShadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>

  <rect width="1100" height="520" fill="url(#teBg)"/>

  <!-- Title -->
  <text x="550" y="32" font-family="system-ui,sans-serif" font-size="17" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="3">TOOL ECOSYSTEM</text>
  <text x="550" y="50" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle" letter-spacing="1">8 travel tools with Strands @tool decorator — voice-triggered tool calling with mock mode fallback</text>

  <!-- Central hub -->
  <g transform="translate(420, 192)">
    <rect width="260" height="100" rx="14" fill="#78350f" fill-opacity="0.35" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" filter="url(#teShadow)"/>
    <!-- Agent icon -->
    <g transform="translate(106,12) scale(0.8)" fill="#fcd34d">
      <circle cx="12" cy="7" r="4" fill="none" stroke="#fcd34d" stroke-width="2"/>
      <path d="M5,20 Q5,14 12,14 Q19,14 19,20" fill="none" stroke="#fcd34d" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="130" y="42" font-family="system-ui,sans-serif" font-size="15" fill="#fcd34d" text-anchor="middle" font-weight="700">BidiAgent</text>
    <text x="130" y="60" font-family="system-ui,sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Nova Sonic orchestrates tool calls</text>
    <text x="130" y="76" font-family="system-ui,sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">from natural voice commands</text>
    <text x="130" y="92" font-family="monospace" font-size="9" fill="#a3a3a3" text-anchor="middle">tools=ALL_TOOLS (8 functions)</text>
  </g>

  <!-- Tool cards - Top row -->
  <!-- search_flights -->
  <g transform="translate(30, 70)">
    <rect width="230" height="96" rx="10" fill="url(#teGreen)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#166534" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#166534" fill-opacity="0.5"/>
    <!-- Flight icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#6ee7b7">
      <path d="M21,16v-2l-8-5V3.5C13,2.67,12.33,2,11.5,2S10,2.67,10,3.5V9l-8,5v2l8-2.5V19l-2,1.5V22l3.5-1l3.5,1v-1.5L13,19v-5.5L21,16z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="700">search_flights</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">Flights via Gemini Search grounding</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">API: google-genai + GoogleSearch tool</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Returns: prices, airlines, duration</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">Model: gemini-3.1-flash-lite-preview</text>
  </g>

  <!-- search_hotels -->
  <g transform="translate(280, 70)">
    <rect width="230" height="96" rx="10" fill="url(#teGreen)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#166534" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#166534" fill-opacity="0.5"/>
    <!-- Hotel icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#6ee7b7">
      <path d="M7,13c1.66,0,3-1.34,3-3S8.66,7,7,7s-3,1.34-3,3S5.34,13,7,13z M19,7h-8v7H3V5H1v15h2v-3h18v3h2v-8C23,8.79,21.21,7,19,7z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="700">search_hotels</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">Hotels via Google Places API (New)</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Endpoint: places:searchText</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Returns: name, rating, address, price</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">Filter: includedType="hotel"</text>
  </g>

  <!-- search_places -->
  <g transform="translate(590, 70)">
    <rect width="230" height="96" rx="10" fill="url(#teGreen)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#166534" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#166534" fill-opacity="0.5"/>
    <!-- Pin icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#6ee7b7">
      <path d="M12,2C8.13,2,5,5.13,5,9c0,5.25,7,13,7,13s7-7.75,7-13C19,5.13,15.87,2,12,2z M12,11.5c-1.38,0-2.5-1.12-2.5-2.5S10.62,6.5,12,6.5s2.5,1.12,2.5,2.5S13.38,11.5,12,11.5z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="700">search_places</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">POI via Google Places API (New)</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Text search + Nearby with locationBias</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Returns: name, coords, rating, types</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">Haversine distance sorting</text>
  </g>

  <!-- plan_route -->
  <g transform="translate(840, 70)">
    <rect width="230" height="96" rx="10" fill="url(#teGreen)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#166534" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#166534" fill-opacity="0.5"/>
    <!-- Route icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#6ee7b7">
      <path d="M21.71,11.29l-9-9c-.39-.39-1.02-.39-1.41,0l-9,9c-.39,.39-.39,1.02,0,1.41l9,9c.39,.39,1.02,.39,1.41,0l9-9C22.1,12.32,22.1,11.69,21.71,11.29z M14,14.5V12h-4v3H8v-4c0-.55,.45-1,1-1h5V7.5l3.5,3.5L14,14.5z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="700">plan_route</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">Directions via Google Routes API v2</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Modes: drive, walk, bicycle, transit</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Returns: distance, duration, steps</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">computeRoutes endpoint</text>
  </g>

  <!-- Connection lines to hub (top) -->
  <line x1="145" y1="166" x2="445" y2="208" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="395" y1="166" x2="470" y2="208" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="705" y1="166" x2="630" y2="208" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="955" y1="166" x2="655" y2="208" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tool cards - Bottom row -->
  <!-- get_weather -->
  <g transform="translate(30, 330)">
    <rect width="230" height="96" rx="10" fill="url(#teGreen)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#166534" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#166534" fill-opacity="0.5"/>
    <!-- Sun icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#6ee7b7">
      <path d="M6.76,4.84l-1.8-1.79-1.41,1.41,1.79,1.79L6.76,4.84zM4,10.5H1v2h3V10.5zM13,0.55h-2V3.5h2V0.55zM20.45,4.46l-1.41-1.41-1.79,1.79,1.41,1.41L20.45,4.46zM17.24,18.16l1.79,1.8,1.41-1.41-1.8-1.79L17.24,18.16zM20,10.5v2h3v-2H20zM12,5.5c-3.31,0-6,2.69-6,6s2.69,6,6,6,6-2.69,6-6S15.31,5.5,12,5.5zM11,22.45h2V19.5h-2V22.45zM3.55,18.54l1.41,1.41,1.79-1.8-1.41-1.41L3.55,18.54z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="700">get_weather</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">Current weather via OpenWeather API</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">By city name or lat/lon coordinates</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Returns: temp, humidity, wind, clouds</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">Endpoint: /data/2.5/weather</text>
  </g>

  <!-- get_forecast -->
  <g transform="translate(280, 330)">
    <rect width="230" height="96" rx="10" fill="url(#teGreen)" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#166534" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#166534" fill-opacity="0.5"/>
    <!-- Calendar icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#6ee7b7">
      <path d="M19,3h-1V1h-2v2H8V1H6v2H5C3.89,3,3.01,3.9,3.01,5L3,19c0,1.1,.89,2,2,2h14c1.1,0,2-.9,2-2V5c0-1.1-.9-2-2-2zm0,16H5V8h14v11zM9,10H7v2h2V10zm4,0h-2v2h2V10zm4,0h-2v2h2V10z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="700">get_forecast</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">5-day forecast via OpenWeather API</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">3-hour intervals grouped by day</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Returns: daily min/max, conditions</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">Endpoint: /data/2.5/forecast</text>
  </g>

  <!-- plan_itinerary -->
  <g transform="translate(590, 330)">
    <rect width="230" height="96" rx="10" fill="url(#teAmber)" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#92400e" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#92400e" fill-opacity="0.5"/>
    <!-- List/plan icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#fcd34d">
      <path d="M3,13h2v-2H3V13z M3,17h2v-2H3V17z M3,9h2V7H3V9z M7,13h14v-2H7V13z M7,17h14v-2H7V17z M7,7v2h14V7H7z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#fcd34d" text-anchor="middle" font-weight="700">plan_itinerary</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">AI itinerary via Nova 2 Lite</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Bedrock converse() with JSON output</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Returns: day plans, activities, budget</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">Model: us.amazon.nova-2-lite-v1:0</text>
  </g>

  <!-- book_flight -->
  <g transform="translate(840, 330)">
    <rect width="230" height="96" rx="10" fill="url(#teAmber)" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1.5" filter="url(#teShadow)"/>
    <rect width="230" height="26" rx="10" fill="#92400e" fill-opacity="0.5"/>
    <rect y="18" width="230" height="8" fill="#92400e" fill-opacity="0.5"/>
    <!-- Browser/computer icon -->
    <g transform="translate(82,4) scale(0.6)" fill="#fcd34d">
      <path d="M20,3H4C2.89,3,2,3.89,2,5v11c0,1.1,.89,2,2,2h6l-2,3v1h8v-1l-2-3h6c1.1,0,2-.9,2-2V5C22,3.89,21.1,3,20,3z M20,14H4V5h16V14z"/>
    </g>
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#fcd34d" text-anchor="middle" font-weight="700">book_flight</text>
    <text x="115" y="44" font-family="system-ui,sans-serif" font-size="9" fill="#d4d4d4" text-anchor="middle">Browser automation via Nova Act</text>
    <text x="115" y="59" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Google Flights: search, sort, extract</text>
    <text x="115" y="74" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Async two-step with progress callback</text>
    <text x="115" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#475569" text-anchor="middle">Sync + async confirm_booking()</text>
  </g>

  <!-- Connection lines to hub (bottom) -->
  <line x1="145" y1="330" x2="445" y2="280" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="395" y1="330" x2="470" y2="280" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="705" y1="330" x2="630" y2="280" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="955" y1="330" x2="655" y2="280" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Legend -->
  <g transform="translate(30, 455)">
    <rect width="14" height="14" rx="3" fill="url(#teGreen)" stroke="#10b981" stroke-opacity="0.3"/>
    <text x="20" y="12" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">= External API tool (Google / OpenWeather)</text>
    <rect x="290" width="14" height="14" rx="3" fill="url(#teAmber)" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="310" y="12" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">= Amazon Nova powered tool (Bedrock / Nova Act)</text>
    <text x="620" y="12" font-family="system-ui,sans-serif" font-size="10" fill="#475569">All tools return mock data when API keys are missing or mock_mode=true</text>
  </g>
</svg>
