<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 360">
  <defs>
    <linearGradient id="lodBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="360" fill="url(#lodBg)"/>

  <!-- Title -->
  <text x="550" y="35" font-family="system-ui, sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="2">ADAPTIVE LOD (LEVEL OF DETAIL) SYSTEM</text>
  <text x="550" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Say "be brief" or "tell me more" — the agent adapts its response depth in real time</text>

  <!-- LOD 1 -->
  <g transform="translate(50, 80)">
    <rect width="310" height="160" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="310" height="40" rx="10" fill="#172554"/>
    <rect y="30" width="310" height="10" fill="#172554"/>
    <text x="155" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="700">L1 — Brief</text>
    <!-- Content -->
    <text x="20" y="62" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Words: 15-40</text>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Structure: Single sentence, core fact</text>
    <text x="20" y="98" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">TTS: Fast pace, professional, no filler</text>
    <text x="20" y="120" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Triggers: "be brief", "too long",</text>
    <text x="20" y="134" font-family="system-ui, sans-serif" font-size="10" fill="#475569">"keep it simple", "tl;dr", "简短"</text>
    <!-- LOD indicator -->
    <rect x="240" y="55" width="50" height="90" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-opacity="0.3"/>
    <rect x="255" y="120" width="20" height="20" rx="3" fill="#3b82f6" opacity="0.6"/>
  </g>

  <!-- Arrow L1 -> L2 -->
  <g transform="translate(360, 145)">
    <line x1="0" y1="15" x2="30" y2="15" stroke="#8b5cf6" stroke-width="1.5"/>
    <polygon points="28,11 35,15 28,19" fill="#8b5cf6"/>
    <text x="17" y="8" font-family="system-ui, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">"more"</text>
    <line x1="30" y1="25" x2="0" y2="25" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="2,21 -5,25 2,29" fill="#3b82f6"/>
    <text x="17" y="40" font-family="system-ui, sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">"brief"</text>
  </g>

  <!-- LOD 2 -->
  <g transform="translate(395, 80)">
    <rect width="310" height="160" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1.5"/>
    <rect width="310" height="40" rx="10" fill="#2e1065"/>
    <rect y="30" width="310" height="10" fill="#2e1065"/>
    <text x="155" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="700">L2 — Standard (Default)</text>
    <text x="20" y="62" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Words: 80-150</text>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Structure: Intro + key points + guidance</text>
    <text x="20" y="98" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">TTS: Medium pace, warm, conversational</text>
    <text x="20" y="120" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Cold start default for all new sessions</text>
    <text x="20" y="134" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Balanced information density</text>
    <rect x="240" y="55" width="50" height="90" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3"/>
    <rect x="255" y="100" width="20" height="40" rx="3" fill="#8b5cf6" opacity="0.6"/>
  </g>

  <!-- Arrow L2 -> L3 -->
  <g transform="translate(705, 145)">
    <line x1="0" y1="15" x2="30" y2="15" stroke="#f59e0b" stroke-width="1.5"/>
    <polygon points="28,11 35,15 28,19" fill="#f59e0b"/>
    <text x="17" y="8" font-family="system-ui, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">"more"</text>
    <line x1="30" y1="25" x2="0" y2="25" stroke="#8b5cf6" stroke-width="1.5"/>
    <polygon points="2,21 -5,25 2,29" fill="#8b5cf6"/>
    <text x="17" y="40" font-family="system-ui, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">"brief"</text>
  </g>

  <!-- LOD 3 -->
  <g transform="translate(740, 80)">
    <rect width="310" height="160" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
    <rect width="310" height="40" rx="10" fill="#78350f"/>
    <rect y="30" width="310" height="10" fill="#78350f"/>
    <text x="155" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#fcd34d" text-anchor="middle" font-weight="700">L3 — Narrative</text>
    <text x="20" y="62" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Words: 400-800</text>
    <text x="20" y="80" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Structure: Complete narrative arc</text>
    <text x="20" y="98" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">TTS: Expressive, storytelling, pauses</text>
    <text x="20" y="120" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Triggers: "tell me more", "elaborate",</text>
    <text x="20" y="134" font-family="system-ui, sans-serif" font-size="10" fill="#475569">"podcast mode", "immersive", "详说"</text>
    <rect x="240" y="55" width="50" height="90" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3"/>
    <rect x="255" y="65" width="20" height="75" rx="3" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Architecture row -->
  <g transform="translate(50, 260)">
    <rect width="1000" height="80" rx="8" fill="#111827" stroke="#475569" stroke-opacity="0.3"/>
    <text x="500" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="600">HOW IT WORKS</text>
    <text x="500" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">User speaks or types -> LOD Controller (regex pattern matching, EN+ZH) -> detect_lod_change() -> prompt_builder rebuilds system prompt</text>
    <text x="500" y="63" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">UI LOD buttons send {"type": "lod", "level": N} -> instant switch | L3 activates podcast narration mode with cinematic language instructions</text>
  </g>
</svg>