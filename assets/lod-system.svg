<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380">
  <defs>
    <linearGradient id="lodBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <filter id="lodShadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>

  <rect width="1100" height="380" fill="url(#lodBg)"/>

  <!-- Title -->
  <text x="550" y="32" font-family="system-ui,sans-serif" font-size="17" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="3">ADAPTIVE LOD SYSTEM</text>
  <text x="550" y="50" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle" letter-spacing="1">Say "be brief" or "tell me more" — the agent adapts response depth in real time</text>

  <!-- LOD 1 — Brief -->
  <g transform="translate(50, 75)">
    <rect width="310" height="172" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5" filter="url(#lodShadow)"/>
    <rect width="310" height="36" rx="12" fill="#172554"/>
    <rect y="28" width="310" height="8" fill="#172554"/>
    <!-- Lightning icon (brief) -->
    <g transform="translate(120,7) scale(0.65)" fill="#60a5fa">
      <path d="M7,2v11h3v9l7-12h-4l4-8H7z"/>
    </g>
    <text x="155" y="26" font-family="system-ui,sans-serif" font-size="15" fill="#60a5fa" text-anchor="middle" font-weight="700">L1 — Brief</text>
    <text x="20" y="60" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Words: 15-40</text>
    <text x="20" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Structure: Single sentence, core fact</text>
    <text x="20" y="100" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">TTS: Fast pace, professional</text>
    <text x="20" y="124" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Triggers: "be brief", "too long",</text>
    <text x="20" y="140" font-family="system-ui,sans-serif" font-size="10" fill="#475569">"keep it simple", "tl;dr", "简短点"</text>
    <!-- Volume indicator -->
    <rect x="246" y="52" width="44" height="96" rx="6" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-opacity="0.2"/>
    <rect x="258" y="126" width="20" height="18" rx="3" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- Arrow L1 → L2 -->
  <g transform="translate(360, 145)">
    <line x1="0" y1="16" x2="30" y2="16" stroke="#8b5cf6" stroke-width="1.5"/>
    <polygon points="28,12 35,16 28,20" fill="#8b5cf6"/>
    <text x="17" y="8" font-family="system-ui,sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="500">"more"</text>
    <line x1="30" y1="28" x2="0" y2="28" stroke="#3b82f6" stroke-width="1.5"/>
    <polygon points="2,24 -5,28 2,32" fill="#3b82f6"/>
    <text x="17" y="44" font-family="system-ui,sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle" font-weight="500">"brief"</text>
  </g>

  <!-- LOD 2 — Standard -->
  <g transform="translate(395, 75)">
    <rect width="310" height="172" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="1.5" filter="url(#lodShadow)"/>
    <rect width="310" height="36" rx="12" fill="#2e1065"/>
    <rect y="28" width="310" height="8" fill="#2e1065"/>
    <!-- Chat icon (standard) -->
    <g transform="translate(100,7) scale(0.65)" fill="#a78bfa">
      <path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z M6,9h12v2H6V9z M14,14H6v-2h8V14z M18,8H6V6h12V8z"/>
    </g>
    <text x="155" y="26" font-family="system-ui,sans-serif" font-size="15" fill="#a78bfa" text-anchor="middle" font-weight="700">L2 — Standard (Default)</text>
    <text x="20" y="60" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Words: 80-150</text>
    <text x="20" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Structure: Intro + key points + guidance</text>
    <text x="20" y="100" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">TTS: Medium pace, warm, conversational</text>
    <text x="20" y="124" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Cold start default for all new sessions</text>
    <text x="20" y="140" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Balanced information density</text>
    <rect x="246" y="52" width="44" height="96" rx="6" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.2"/>
    <rect x="258" y="105" width="20" height="39" rx="3" fill="#8b5cf6" opacity="0.5"/>
  </g>

  <!-- Arrow L2 → L3 -->
  <g transform="translate(705, 145)">
    <line x1="0" y1="16" x2="30" y2="16" stroke="#f59e0b" stroke-width="1.5"/>
    <polygon points="28,12 35,16 28,20" fill="#f59e0b"/>
    <text x="17" y="8" font-family="system-ui,sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="500">"more"</text>
    <line x1="30" y1="28" x2="0" y2="28" stroke="#8b5cf6" stroke-width="1.5"/>
    <polygon points="2,24 -5,28 2,32" fill="#8b5cf6"/>
    <text x="17" y="44" font-family="system-ui,sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="500">"brief"</text>
  </g>

  <!-- LOD 3 — Narrative -->
  <g transform="translate(740, 75)">
    <rect width="310" height="172" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.5" filter="url(#lodShadow)"/>
    <rect width="310" height="36" rx="12" fill="#78350f"/>
    <rect y="28" width="310" height="8" fill="#78350f"/>
    <!-- Podcast/headphone icon (narrative) -->
    <g transform="translate(105,7) scale(0.65)" fill="#fcd34d">
      <path d="M12,3C7.03,3,3,7.03,3,12v7c0,1.1,.9,2,2,2h2v-8H5v-1c0-3.87,3.13-7,7-7s7,3.13,7,7v1h-2v8h2c1.1,0,2-.9,2-2v-7C21,7.03,16.97,3,12,3z"/>
    </g>
    <text x="155" y="26" font-family="system-ui,sans-serif" font-size="15" fill="#fcd34d" text-anchor="middle" font-weight="700">L3 — Narrative</text>
    <text x="20" y="60" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Words: 400-800</text>
    <text x="20" y="80" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Structure: Complete narrative arc</text>
    <text x="20" y="100" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">TTS: Expressive, storytelling, pauses</text>
    <text x="20" y="124" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Triggers: "tell me more", "elaborate",</text>
    <text x="20" y="140" font-family="system-ui,sans-serif" font-size="10" fill="#475569">"podcast mode", "immersive", "详细讲讲"</text>
    <rect x="246" y="52" width="44" height="96" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-opacity="0.2"/>
    <rect x="258" y="66" width="20" height="78" rx="3" fill="#f59e0b" opacity="0.5"/>
  </g>

  <!-- Architecture row -->
  <g transform="translate(50, 268)">
    <rect width="1000" height="90" rx="10" fill="#111827" stroke="#475569" stroke-opacity="0.2" filter="url(#lodShadow)"/>
    <rect width="1000" height="28" rx="10" fill="#1e293b"/>
    <rect y="20" width="1000" height="8" fill="#1e293b"/>
    <!-- Gear icon -->
    <g transform="translate(470,4) scale(0.6)" fill="#94a3b8">
      <path d="M19.14,12.94c.04-.31,.06-.63,.06-.94s-.02-.63-.06-.94l2.03-1.58c.18-.14,.23-.41,.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39,.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24,0-.43,.17-.47,.41l-.36,2.54c-.59,.24-1.13,.57-1.62,.94l-2.39-.96c-.22-.08-.47,0-.59,.22l-1.92,3.32c-.12,.22-.07,.47,.12,.61l2.03,1.58c-.04,.31-.07,.63-.07,.94s.02,.63,.06,.94l-2.03,1.58c-.18,.14-.23,.41-.12,.61l1.92,3.32c.12,.22,.37,.29,.59,.22l2.39-.96c.5,.38,1.03,.7,1.62,.94l.36,2.54c.05,.24,.24,.41,.48,.41h3.84c.24,0,.44-.17,.47-.41l.36-2.54c.59-.24,1.13-.56,1.62-.94l2.39,.96c.22,.08,.47,0,.59-.22l1.92-3.32c.12-.22,.07-.47-.12-.61l-2.01-1.58zM12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6,3.6,1.62,3.6,3.6-1.62,3.6-3.6,3.6z"/>
    </g>
    <text x="500" y="22" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="600">HOW IT WORKS</text>
    <text x="500" y="48" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">User speaks or types → LOD Controller (60+ regex patterns, EN+ZH) → detect_lod_change() → prompt_builder rebuilds system prompt</text>
    <text x="500" y="66" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">UI LOD buttons send {"type": "lod", "level": N} → instant switch | L3 activates podcast narration mode with cinematic language</text>
    <text x="500" y="82" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">Priority-based detection: explicit commands > polite requests > implicit signals > Chinese patterns</text>
  </g>
</svg>
