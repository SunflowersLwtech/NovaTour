<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420">
  <defs>
    <linearGradient id="vpBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1729"/>
    </linearGradient>
    <linearGradient id="vpAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
    <linearGradient id="vpBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#172554"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="420" fill="url(#vpBg)"/>

  <!-- Title -->
  <text x="550" y="35" font-family="system-ui, sans-serif" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="700" letter-spacing="2">VOICE PIPELINE — BIDIRECTIONAL AUDIO STREAMING</text>

  <!-- ═══ FLOW: LEFT TO RIGHT ═══ -->

  <!-- Step 1: Browser Mic -->
  <g transform="translate(40, 70)">
    <rect width="160" height="130" rx="10" fill="url(#vpBlue)" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" font-weight="700">Browser</text>
    <line x1="20" y1="35" x2="140" y2="35" stroke="#3b82f6" stroke-opacity="0.2"/>
    <text x="80" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">getUserMedia()</text>
    <text x="80" y="72" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ScriptProcessor</text>
    <text x="80" y="89" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">resample -> 16kHz</text>
    <text x="80" y="106" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">float32 -> int16</text>
    <text x="80" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">PCM -> base64</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(200, 115)">
    <line x1="0" y1="20" x2="55" y2="20" stroke="#60a5fa" stroke-width="2"/>
    <polygon points="53,16 60,20 53,24" fill="#60a5fa"/>
    <text x="28" y="12" font-family="system-ui, sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">WS</text>
    <text x="28" y="38" font-family="monospace" font-size="7" fill="#475569" text-anchor="middle">{"type":"audio"}</text>
  </g>

  <!-- Step 2: WebSocket Handler -->
  <g transform="translate(260, 70)">
    <rect width="160" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="13" fill="#fcd34d" text-anchor="middle" font-weight="700">WS Handler</text>
    <line x1="20" y1="35" x2="140" y2="35" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="80" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">ws_handler.py</text>
    <text x="80" y="72" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">LOD detection</text>
    <text x="80" y="89" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Event conversion</text>
    <text x="80" y="106" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">asyncio.wait()</text>
    <text x="80" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Dual-task bridge</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(420, 115)">
    <line x1="0" y1="20" x2="55" y2="20" stroke="#f59e0b" stroke-width="2"/>
    <polygon points="53,16 60,20 53,24" fill="#f59e0b"/>
    <text x="28" y="12" font-family="system-ui, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">BidiInput</text>
  </g>

  <!-- Step 3: BidiAgent -->
  <g transform="translate(480, 70)">
    <rect width="180" height="130" rx="10" fill="url(#vpAmber)" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="90" y="25" font-family="system-ui, sans-serif" font-size="13" fill="#fcd34d" text-anchor="middle" font-weight="700">BidiAgent</text>
    <line x1="20" y1="35" x2="160" y2="35" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="90" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Strands SDK</text>
    <text x="90" y="72" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">System prompt (LOD)</text>
    <text x="90" y="89" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">8 tool bindings</text>
    <text x="90" y="106" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Turn detection</text>
    <text x="90" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Voice: Matthew</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(660, 115)">
    <line x1="0" y1="20" x2="55" y2="20" stroke="#f59e0b" stroke-width="2"/>
    <polygon points="53,16 60,20 53,24" fill="#f59e0b"/>
    <text x="28" y="12" font-family="system-ui, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Bedrock</text>
  </g>

  <!-- Step 4: Nova Sonic -->
  <g transform="translate(720, 70)">
    <rect width="170" height="130" rx="10" fill="url(#vpAmber)" stroke="#f59e0b" stroke-opacity="0.6" stroke-width="2"/>
    <text x="85" y="25" font-family="system-ui, sans-serif" font-size="13" fill="#fcd34d" text-anchor="middle" font-weight="700">Nova 2 Sonic</text>
    <line x1="20" y1="35" x2="150" y2="35" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="85" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">AWS Bedrock</text>
    <text x="85" y="72" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Speech-to-Speech</text>
    <text x="85" y="89" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Real-time S2S</text>
    <text x="85" y="106" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">Tool calling</text>
    <text x="85" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#d4d4d4" text-anchor="middle">PCM 16kHz I/O</text>
  </g>

  <!-- Tool calling branch down from BidiAgent -->
  <line x1="570" y1="200" x2="570" y2="240" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="566,238 570,246 574,238" fill="#10b981"/>

  <!-- Tools box -->
  <g transform="translate(440, 250)">
    <rect width="260" height="50" rx="8" fill="#14532d" fill-opacity="0.4" stroke="#10b981" stroke-opacity="0.4" stroke-width="1"/>
    <text x="130" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="600">Tool Execution</text>
    <text x="130" y="40" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">flights / hotels / places / weather / itinerary / booking</text>
  </g>

  <!-- Return path (bottom) -->
  <g transform="translate(40, 315)">
    <rect width="850" height="85" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-opacity="0.2" stroke-width="1"/>
    <text x="425" y="25" font-family="system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle" font-weight="700">RETURN PATH — Audio + Events -> Client</text>
    <text x="425" y="48" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Nova Sonic generates speech response -> BidiAudioStreamEvent -> base64 PCM -> WebSocket -> AudioPlayer -> speakers</text>
    <text x="425" y="65" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Transcripts, tool results, itinerary data, LOD changes, interruptions all forwarded as typed JSON events</text>
    <text x="425" y="78" font-family="system-ui, sans-serif" font-size="9" fill="#475569" text-anchor="middle">BidiContentEndEvent with stop_reason="INTERRUPTED" clears the AudioPlayer buffer for barge-in support</text>
  </g>

  <!-- Fallback note -->
  <g transform="translate(910, 70)">
    <rect width="170" height="130" rx="10" fill="#1e293b" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="85" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle" font-weight="600">Fallback</text>
    <line x1="20" y1="35" x2="150" y2="35" stroke="#ef4444" stroke-opacity="0.15"/>
    <text x="85" y="55" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">MockAgent</text>
    <text x="85" y="72" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Text-mode echo</text>
    <text x="85" y="89" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Same interface</text>
    <text x="85" y="106" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Auto-retry once</text>
    <text x="85" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">then graceful fallback</text>
  </g>
</svg>