<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0f1729;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#60a5fa">
    <line x1="0" y1="40" x2="1200" y2="40" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="320" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="320" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles / orbs -->
  <circle cx="150" cy="160" r="120" fill="#3b82f6" opacity="0.03"/>
  <circle cx="1050" cy="160" r="140" fill="#f59e0b" opacity="0.03"/>
  <circle cx="600" cy="160" r="200" fill="#3b82f6" opacity="0.02"/>

  <!-- Sound wave decoration - left -->
  <g transform="translate(80, 130)" opacity="0.15" stroke="#60a5fa" fill="none" stroke-width="2">
    <path d="M0,30 Q10,10 20,30 Q30,50 40,30 Q50,10 60,30"/>
    <path d="M0,45 Q10,25 20,45 Q30,65 40,45 Q50,25 60,45" opacity="0.6"/>
    <path d="M0,60 Q10,40 20,60 Q30,80 40,60 Q50,40 60,60" opacity="0.3"/>
  </g>

  <!-- Airplane path decoration - right -->
  <g transform="translate(1020, 80)" opacity="0.12">
    <path d="M0,60 Q40,20 80,40 Q120,60 160,30" stroke="#f59e0b" fill="none" stroke-width="1.5" stroke-dasharray="4,4"/>
    <polygon points="160,30 150,25 152,33" fill="#f59e0b"/>
  </g>

  <!-- Globe/location dots -->
  <g opacity="0.08" fill="#60a5fa">
    <circle cx="180" cy="220" r="3"/>
    <circle cx="220" cy="200" r="2"/>
    <circle cx="260" cy="230" r="2.5"/>
    <circle cx="940" cy="100" r="2"/>
    <circle cx="980" cy="120" r="3"/>
    <circle cx="1020" cy="90" r="2"/>
    <circle cx="1060" cy="130" r="2.5"/>
  </g>

  <!-- Main title: Nova -->
  <text x="440" y="145" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Nova</text>

  <!-- Main title: Tour -->
  <text x="672" y="145" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="url(#accentGrad)" letter-spacing="-2" filter="url(#glow)">Tour</text>

  <!-- Subtitle -->
  <text x="600" y="185" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle" letter-spacing="4" font-weight="300">AI VOICE TRAVEL ASSISTANT</text>

  <!-- Tagline -->
  <text x="600" y="225" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle" letter-spacing="1">Speak your dream trip. Watch it come to life.</text>

  <!-- Service badges -->
  <g transform="translate(310, 252)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="60" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="600">Nova Sonic</text>

    <rect x="135" y="0" width="110" height="28" rx="14" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="190" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">Nova Lite</text>

    <rect x="260" y="0" width="100" height="28" rx="14" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="310" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="600">Nova Act</text>

    <rect x="375" y="0" width="130" height="28" rx="14" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="440" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Strands Agents</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="350" y="300" width="500" height="2" rx="1" fill="url(#accentGrad)" opacity="0.3"/>
</svg>